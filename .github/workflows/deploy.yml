# test01/.github/workflows/deploy.yml

name: "Terraform & Ansible CI/CD"
on:
  push:
    branches: ["master"]
jobs:
  deploy:
    runs-on: ubuntu-latest # 최신 ubuntu machine 을 잠시 빌려서 아래의 작업을 수행하겠다는 의미
    # ubuntu machine 의 환경 변수에 넣어줄 값을 세팅하는 설정
    # mgmt 서버에 aws configure 실행해서키를 등록했듯 1회용 ubuntu 서버에도 동일한 작업을 해준다.
    # job 안의 모든 step 에서 등록된 aws 키를 공통으로 사용하게된다..
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }} # github 에 secrets 등록
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      # 1. 소스코드 체크아웃 ( 대상 github 저장소를 clone 하고 해당 폴더안으로 들어감 )
      - uses: actions/checkout@v5
      # 2. 테라폼 환경 구성
      - name: setup Terraform
        uses: hashicorp/setup-terraform@v4
      # 3. init, apply 실행
      - name: terraform init & apply
        run: |
          terraform init
          terraform apply --auto-approve
      # 4. ansible 용 key setting
      - name: setup ssh key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
      # 5. ansible playbook 실행
      - name: run ansible playbook
        run: |
          # terraform 이 이미 inventory.yml과 ansible.cfg를 현 디렉토리에 만들어놓고..
          ansible-playbook nginx_setup.yml
